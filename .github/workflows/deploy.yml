name: Deploy to Production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      
      - name: Deploy to VM
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /root/study-material-service

          # Configure git
          git config --global --add safe.directory /root/study-material-service
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # Fetch latest from remote using HTTPS with token
          git fetch https://${{ env.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git ${{ github.ref_name }}
          
          # Reset to exact remote version of current branch (discards local changes)
          git reset --hard FETCH_HEAD
          
          # Clean untracked files (respects .gitignore)
          git clean -fd
          
          # Write .env file
          cat > .env << 'EOF'
          ${{ secrets.DOCKER_COMPOSE_ENV }}
          EOF
          
          # Build and restart containers
          docker compose build
          docker compose up -d
          
          # Show status
          docker compose ps
          # Clean up unused Docker resources after deployment
          docker system prune -f